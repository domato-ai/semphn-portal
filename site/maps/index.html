<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Maps · SEMPHN Workbench</title>
<meta name="description" content="Chat-build catchment maps for South Eastern Melbourne PHN. Choropleth + point overlay + heat." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet" />

<!-- Leaflet · real interactive map for choropleths, points and overlays.
     Real OSM tiles + actual SEMPHN LGA polygons from ABS LGA 2016 boundaries
     (bundled as /_assets/semphn-catchment.geojson, ~5.7 KB).
     Plus: Leaflet.markercluster for clustered service-point overlays. -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="" defer></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" defer></script>

<!-- ECharts for the bar/donut/kpi/table widgets that also work on the Maps page. -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js" defer></script>

<style>
  /* Maps builder · full-bleed map fills the canvas-body. */

  /* Override the default canvas-body padding so the map can fill edge-to-edge.
     The map IS the page; chrome lives only in the global nav + canvas-head. */
  .canvas-body-flush {
    padding: 0 !important;
    overflow: hidden;  /* no scroll when map is the only content */
    position: relative;
  }

  /* Default state · map fills the canvas-body entirely. Using absolute
     positioning so we don't depend on flex propagation through deep nesting. */
  .maps-default {
    position: absolute;
    inset: 0;
  }
  .maps-default[hidden] { display: none; }
  .maps-default-canvas {
    width: 100%; height: 100%;
    background: var(--rule-soft);
    position: relative;
    z-index: 0;
  }
  /* When widgets exist, the empty state hides and widget-grid takes over.
     Tiles get padding back so they don't go edge-to-edge. */
  .widget-grid-padded {
    display: none;  /* hidden by default */
  }
  .widget-grid-padded:not(:empty) {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.1rem;
    padding: clamp(1.5rem, 3vw, 2.5rem);
    overflow-y: auto;
    position: absolute; inset: 0;
    background: var(--rule-bg);
  }

  /* Tighter canvas-head pills · widget count + clear in the toolbar */
  .canvas-pill {
    display: inline-flex; align-items: center;
    padding: 0.32rem 0.7rem;
    background: var(--rule-soft);
    border-radius: 999px;
    font-size: 0.74rem;
    color: var(--slate);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    margin-right: 0.15rem;
  }
</style>
</head>
<body data-page="maps" data-context="SEMPHN catchment maps. 10 LGAs: Bayside, Cardinia, Casey, Frankston, Glen Eira, Greater Dandenong, Kingston, Mornington Peninsula, Port Phillip, Stonnington. MH conditions per 1,000 residents: Frankston 116.1 (highest), Mornington Peninsula 102.6, Greater Dandenong 97.4, Casey 94.1, Port Phillip 91.8, Cardinia 88.4, Kingston 83.7, Bayside 82.5, Glen Eira 78.3, Stonnington 76.9 (lowest).">

<header class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <span class="mark"><img src="/atlas/_assets/semphn-logo.svg" alt="" /></span>
      <span class="lockup">
        <span class="name">South Eastern Melbourne PHN</span>
        <span class="sub">Workbench</span>
      </span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="/hna/"        class="nav-link" data-page="hna"><span class="dot"></span>HNA</a>
      <a href="/dashboards/" class="nav-link" data-page="dashboards"><span class="dot"></span>Dashboards</a>
      <a href="/maps/"       class="nav-link" data-page="maps"><span class="dot"></span>Maps</a>
    </nav>
    <button type="button" class="nav-cmdk" aria-label="Open command palette" title="Open command palette">
      <span>Search</span> <kbd>⌘K</kbd>
    </button>
    <div class="nav-user" aria-label="Signed-in tenant">
      <span class="av">D</span>
      <span class="meta">
        <span class="who">demo@semphn.org.au</span>
        <span class="sub">SEMPHN · PHN108</span>
      </span>
      <button type="button">Sign out</button>
    </div>
  </div>
</header>

<div class="split">

  <!-- CHAT (LEFT) -->
  <section class="chat" aria-label="Workbench chat">
    <div class="chat-toolbar">
      <div class="chat-toolbar-left">
        <span class="chat-toolbar-label">Chat</span>
        <span class="chat-msgcount" id="chat-msgcount" aria-live="polite"></span>
      </div>
      <div class="chat-toolbar-right">
        <button type="button" class="chat-tool chat-tool-icon" id="chat-export" title="Export chat as Markdown" aria-label="Export chat">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8"/><path d="m4.5 6.5 3.5 3.5 3.5-3.5"/><path d="M2.5 13h11"/></svg>
        </button>
        <button type="button" class="chat-tool" id="chat-clear" title="Clear this chat" aria-label="Clear chat">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h10"/><path d="M6 5V3.5A1.5 1.5 0 0 1 7.5 2h1A1.5 1.5 0 0 1 10 3.5V5"/><path d="M4.5 5l.5 8a1.5 1.5 0 0 0 1.5 1.4h3a1.5 1.5 0 0 0 1.5-1.4L11.5 5"/></svg>
          <span>Clear</span>
        </button>
        <button type="button" class="chat-tool chat-collapse" aria-label="Collapse chat panel" title="Collapse chat panel">‹</button>
      </div>
    </div>
    <div class="chat-feed" id="chat-feed"></div>
    <!-- Contextual suggested prompts · starter chips before first turn,
         follow-up chips after each turn. Driven by renderSuggestStrip(). -->
    <div class="chat-suggest" id="chat-suggest" aria-label="Suggested prompts"></div>
    <footer class="composer">
      <div class="composer-wrap">
        <textarea id="chat-input" rows="1" placeholder='Ask anything…' aria-label="Ask for changes"></textarea>
        <button type="button" class="send" id="chat-send" disabled aria-label="Send">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 14V2"/><path d="m3 7 5-5 5 5"/></svg>
        </button>
      </div>
      <div class="composer-hint" aria-hidden="true">
        <span><kbd>/</kbd> templates</span><span>·</span><span><kbd>Tab</kbd> insert suggestion</span><span>·</span><span><kbd>⏎</kbd> send</span>
      </div>
    </footer>
  </section>

  <div class="split-handle" role="separator" aria-orientation="vertical" aria-label="Resize chat panel"></div>

  <!-- CANVAS (RIGHT) -->
  <section class="canvas" aria-label="Maps canvas">
    <header class="canvas-head">
      <span class="page-label">
        <span class="dot"></span>Maps
        <small>· catchment choropleth &amp; overlays</small>
      </span>
      <div class="canvas-actions">
        <button type="button" id="map-reset" title="Reset map to clean state">Reset map</button>
        <button type="button" id="widget-clear" title="Clear all widgets" hidden>Clear</button>
        <button type="button">Export PNG</button>
        <button type="button" class="primary">Embed in HNA</button>
      </div>
    </header>

    <!-- Full-bleed canvas body · the map fills the entire viewport. -->
    <div class="canvas-body canvas-body-flush">
      <!-- DEFAULT STATE · interactive SEMPHN catchment map. No wrapper
           card, no header, no tips. The map IS the page. Hidden when
           any widget lands. -->
      <div id="widget-empty" class="maps-default">
        <div id="maps-default-canvas" class="maps-default-canvas"></div>
      </div>

      <!-- Widget grid · only shown when widgets exist. Padded so tiles
           don't go edge-to-edge. -->
      <div id="widget-grid" class="widget-grid-padded"></div>

      <!-- LGA detail drawer · slides in from the right when a polygon is clicked -->
      <aside id="lga-drawer" class="lga-drawer" aria-label="LGA detail" aria-hidden="false"></aside>
    </div>
  </section>
</div>


<footer class="statusbar" role="status">
  <div class="statusbar-left">
    <span class="statusbar-item live" data-status="ai"> AI · ready</span>
    <span class="statusbar-item hide-mobile" data-status="saved">All changes synced</span>
  </div>
  <div class="statusbar-right">
    <span class="statusbar-item hide-mobile">SEMPHN · PHN108</span>
    <span class="statusbar-item"><kbd>⌘K</kbd> commands</span>
    <span class="statusbar-item hide-mobile"><kbd>⌘\</kbd> toggle chat</span>
  </div>
</footer>
<script>
(function () {
  /* Reset map · returns to the clean default state (no choropleth, no points) */
  var resetBtn = document.getElementById('map-reset');
  if (resetBtn) resetBtn.addEventListener('click', function () {
    if (window.__defaultMapApi && typeof window.__defaultMapApi.reset === 'function') {
      window.__defaultMapApi.reset();
      if (typeof window.showToast === 'function') window.showToast('Map reset', 'success');
    }
    // Also clear any widget tiles that may have been added
    try {
      var raw = localStorage.getItem('semphn.workbench.widgets.v1');
      var s = raw ? JSON.parse(raw) : {};
      if (s.maps && s.maps.length) {
        s.maps = [];
        localStorage.setItem('semphn.workbench.widgets.v1', JSON.stringify(s));
        if (typeof window.__renderWidgets === 'function') window.__renderWidgets();
      }
    } catch (_) {}
  });

  /* DEFAULT STATE · full-featured Leaflet GIS preview of the SEMPHN catchment.
   * Includes: light/satellite/streets layer toggle, Nominatim search,
   * Locate Me, clustered SEMPHN service-point markers, LGA polygons. */
  var defaultMap = null;
  function initDefaultMap() {
    var div = document.getElementById('maps-default-canvas');
    if (!div) return;
    if (defaultMap) { try { defaultMap.invalidateSize(); } catch (_) {} return; }
    // Wait for Leaflet AND markercluster (both deferred CDN loads)
    if (typeof window.L === 'undefined' || typeof L.markerClusterGroup === 'undefined') {
      return setTimeout(initDefaultMap, 120);
    }
    if (typeof window.__mountSemphnLeaflet !== 'function') {
      return setTimeout(initDefaultMap, 120);
    }
    // CLEAN default state · just OSM tiles + LGA polygons.
    // Users add data via Map Templates, Service Points chips, or chat.
    window.__mountSemphnLeaflet(div, {
      mode: 'default',
      showSearch: true,
      showLocate: true,
      showLayerToggle: true,
      showServicePoints: false,
    }).then(function (mapApi) {
      defaultMap = mapApi.map;
      // Expose the mapApi globally so chat templates + chip clicks can
      // overlay data onto this map.
      window.__defaultMapApi = mapApi;
    }).catch(function (e) { console.error('[default-map] mount failed', e); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { setTimeout(initDefaultMap, 200); });
  } else {
    setTimeout(initDefaultMap, 200);
  }
  window.__initMapsDefault = initDefaultMap;
})();
</script>
<script src="/_assets/shell.js?v=1784700000"></script>
</body>
</html>
